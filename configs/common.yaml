# Shared process defaults used by source-specific service launchers.

runtime:
  python_bin: python3
  ffmpeg_bin: ""
  ffmpeg_threads: 4
  ffmpeg_timeout: 180

gdrive:
  remote: "gdrive:"
  raw:
    url: "https://drive.google.com/drive/folders/1v06momk8fR-eqw79Z93zczBx_InWsCS9?usp=drive_link"
    folder_id: "1v06momk8fR-eqw79Z93zczBx_InWsCS9"
  processed:
    url: "https://drive.google.com/drive/folders/1D6vtNpRmZabqnlW4598X6lqgFETZ9RvO"
    folder_id: "1D6vtNpRmZabqnlW4598X6lqgFETZ9RvO"

source:
  batch_glob: "batch_*"
  complete_flag_name: "fetch_complete.json"

process:
  max_archives: 0
  keep_failed_artifacts: false
  gpu_processing_clip_max_length_sec: 30.0

dataset_processing:
  save_frame_log: false
  keep_normalized: false

  normalization_fps: 25
  normalization_bitrate: 20m
  normalization_codec: auto
  pixel_format: yuv420p

  model_path: assets/face_landmarker_v2_with_blendshapes.task
  num_faces: 2
  min_detection_confidence: 0.85
  min_presence_confidence: 0.85
  use_gpu: false

  min_face_h: 100
  max_abs_yaw: 30.0
  max_abs_pitch: 25.0
  max_abs_roll: 20.0
  max_delta_cx_ratio: 0.08
  max_delta_cy_ratio: 0.08
  max_delta_yaw: 10.0
  max_delta_pitch: 10.0
  max_delta_roll: 12.0
  max_face_h_ratio_deviation: 0.12
  max_face_w_ratio_deviation: 0.12
  min_confidence: 0.5
  min_segment_length: 50
  max_segment_length: 200
  motion_window_frames: 25
  max_cumulative_motion_ratio: 0.25

  conf_mean_abs_yaw: 12.0
  conf_mean_abs_pitch: 10.0
  conf_mean_abs_roll: 8.0
  conf_max_abs_yaw: 20.0
  conf_max_abs_pitch: 16.0
  conf_max_abs_roll: 12.0
  conf_face_size_std_ratio: 0.08
  conf_face_width_std_ratio: 0.08
  conf_std_cx_ratio: 0.04
  conf_std_cy_ratio: 0.04
  conf_eye_dist_std_ratio: 0.03
  conf_eye_mouth_std_ratio: 0.03
  conf_scale_outlier_ratio: 0.02
  conf_jump_ratio: 0.02
  conf_low_conf_ratio: 0.02
  med_mean_abs_yaw: 18.0
  med_mean_abs_pitch: 14.0
  med_mean_abs_roll: 12.0
  med_max_abs_yaw: 28.0
  med_max_abs_pitch: 20.0
  med_max_abs_roll: 18.0
  med_face_size_std_ratio: 0.15
  med_face_width_std_ratio: 0.15
  med_std_cx_ratio: 0.08
  med_std_cy_ratio: 0.08
  med_eye_dist_std_ratio: 0.06
  med_eye_mouth_std_ratio: 0.06
  med_scale_outlier_ratio: 0.05
  med_jump_ratio: 0.08
  med_low_conf_ratio: 0.08

  export_fps: 25
  export_bitrate: 600k
  export_codec: auto
  export_pixel_format: yuv420p
